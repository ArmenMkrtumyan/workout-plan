<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Armen — 8-Week Gym + Meal Plan</title>
<link rel="stylesheet" href="styles.css?v=20260704a" />
<script>
  // Boot version — MUST equal the ?v= below. Bump both together on every deploy.
  window.__APPV = "20260704a";
  // Self-heal a stale-cached index.html: ask the server (bypassing cache) what the latest
  // build is; if it's newer than the one we booted with, jump to a fresh cache-busted URL
  // once. Guarded by sessionStorage so it can never loop, and silent when offline.
  (function () {
    try {
      fetch("index.html?cb=" + Date.now(), { cache: "no-store" })
        .then(function (r) { return r.ok ? r.text() : ""; })
        .then(function (html) {
          var m = html.match(/app\.js\?v=([0-9a-z]+)/);
          if (!m || m[1] === window.__APPV) return;
          if (sessionStorage.getItem("wp_v_reload") === m[1]) return;
          sessionStorage.setItem("wp_v_reload", m[1]);
          location.replace(location.pathname + "?u=" + m[1] + location.hash);
        })
        .catch(function () {});
    } catch (e) {}
  })();
</script>
</head>
<body>
  <header class="topbar">
    <button id="navToggle" class="nav-toggle" aria-label="Menu">☰</button>
    <div class="brand">
      <span class="brand-mark">💪</span>
      <span class="brand-text">8-Week Plan</span>
    </div>
    <div class="topbar-right" id="topbarMeta"></div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <a href="#today" class="nav-link" data-view="today">📅 Today</a>
      <a href="#dashboard" class="nav-link" data-view="dashboard">🎯 Dashboard</a>
      <a href="#training" class="nav-link" data-view="training">🏋️ Training</a>
      <a href="#meals" class="nav-link" data-view="meals">🍽️ Meals</a>
      <a href="#recipes" class="nav-link" data-view="recipes">📖 Recipes</a>
      <a href="#grocery" class="nav-link" data-view="grocery">🛒 Grocery</a>
      <a href="#spendings" class="nav-link" data-view="spendings">💵 Spendings</a>
      <a href="#progress" class="nav-link" data-view="progress">📈 Progress</a>
    </nav>

    <main class="content" id="content"></main>
  </div>

  <div class="modal-overlay" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ?v= is a cache-buster: bump it on every deploy so phones/browsers fetch the
       new code instead of a stale cached copy (sync only mirrors data, not code). -->
  <script src="data.js?v=20260704a"></script>
  <script src="app.js?v=20260704a"></script>
  <script type="module" src="firebase-sync.js?v=20260704a"></script>
</body>
</html>
