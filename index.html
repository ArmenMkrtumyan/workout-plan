<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Armen — 8-Week Gym + Meal Plan</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="navToggle" class="nav-toggle" aria-label="Menu">☰</button>
    <div class="brand">
      <span class="brand-mark">💪</span>
      <span class="brand-text">8-Week Plan</span>
    </div>
    <div class="topbar-right" id="topbarMeta"></div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <a href="#today" class="nav-link" data-view="today">📅 Today</a>
      <a href="#dashboard" class="nav-link" data-view="dashboard">🎯 Dashboard</a>
      <a href="#training" class="nav-link" data-view="training">🏋️ Training</a>
      <a href="#meals" class="nav-link" data-view="meals">🍽️ Meals</a>
      <a href="#recipes" class="nav-link" data-view="recipes">📖 Recipes</a>
      <a href="#grocery" class="nav-link" data-view="grocery">🛒 Grocery</a>
      <a href="#progress" class="nav-link" data-view="progress">📈 Progress</a>
      <a href="#guides" class="nav-link" data-view="guides">📋 Guides</a>
    </nav>

    <main class="content" id="content"></main>
  </div>

  <div class="modal-overlay" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
